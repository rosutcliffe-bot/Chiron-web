name: HTML Code Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  htmlhint:
    name: Lint HTML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: find . -name '*.html' | xargs htmlhint
